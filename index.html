<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Bubble Wrap - Speedrun!</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f0f3f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { color: #333; margin-bottom: 5px; }
        
        .stats-container {
            display: flex;
            gap: 40px;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #popCount { color: #007bff; }
        #timer { color: #dc3545; }

        .wrap-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            position: relative;
        }

        .bubble {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #aadaff 40%, #4da3ff 100%);
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.15), 2px 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .bubble:active { transform: scale(0.9); }

        .bubble.popped {
            background: #e2e8f0;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1);
            cursor: default;
            transform: scale(0.95);
            pointer-events: none;
        }

        #victoryMessage {
            display: none;
            margin-top: 15px;
            font-size: 1.5rem;
            color: #28a745;
            font-weight: bold;
            animation: bounce 0.5s infinite alternate;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #333;
            background: white;
            border-radius: 8px;
            box-shadow: 2px 2px 0px #333;
            transition: 0.1s;
        }
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #333;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <h1>Bubble Wrap Speedrun - Poppy</h1>
    
    <div class="stats-container">
        <div>Popped: <span id="popCount">0</span>/24</div>
        <div>Time: <span id="timer">0.00</span>s</div>
    </div>

    <div class="wrap-container" id="box"></div>
    
    <div id="victoryMessage">🎉Clear! Magnificent popping!🎉</div>

    <button id="resetBtn">Fresh Sheet</button>

    <script>
        const box = document.getElementById('box');
        const popCountDisplay = document.getElementById('popCount');
        const timerDisplay = document.getElementById('timer');
        const resetBtn = document.getElementById('resetBtn');
        const victoryMessage = document.getElementById('victoryMessage');
        
        let poppedCount = 0;
        const totalBubbles = 24;
        
        let startTime = null;
        let timerInterval = null;
        let gameActive = false;

        
        function makeSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(430, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.06);
            
            gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.06);
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.06);
        }

        
        function tick() {
            if (!startTime) return;
            const elapsedTime = (Date.now() - startTime) / 1000;
            timerDisplay.innerText = elapsedTime.toFixed(2);
        } 
        function setup() {
            box.innerHTML = '';
            poppedCount = 0;
            popCountDisplay.innerText = poppedCount;
            
            clearInterval(timerInterval);
            startTime = null;
            gameActive = false;
            timerDisplay.innerText = "0.00";
            victoryMessage.style.display = 'none';

            for (let i = 0; i < totalBubbles; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                bubble.addEventListener('click', () => {
                    if (!bubble.classList.contains('popped')) {
                        if (!gameActive) {
                            gameActive = true;
                            startTime = Date.now();
                            timerInterval = setInterval(tick, 10);
                        }

                        bubble.classList.add('popped');
                        poppedCount++;
                        popCountDisplay.innerText = poppedCount;
                        makeSound();

                        if (poppedCount === totalBubbles) {
                            clearInterval(timerInterval);
                            victoryMessage.style.display = 'block';
                        }
                    }
                });

                box.appendChild(bubble);
            }
        }

        resetBtn.addEventListener('click', setup);
        setup(); 
    </script>
</body>
</html>
